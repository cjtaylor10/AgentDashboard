<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentDashboard · Cockpit</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">▦</span>
      <span class="brand-name">Agent<b>Dashboard</b></span>
      <span class="brand-sub">cockpit</span>
    </div>

    <div class="header-goal">
      <span class="label">Goal</span>
      <span id="goal" class="goal-text">—</span>
    </div>

    <nav class="header-controls">
      <div class="stat-group">
        <span class="stat-label">Cycle</span>
        <span id="cycleState" class="pill">—</span>
      </div>
      <div class="stat-group">
        <span class="stat-label">Spend</span>
        <span id="spend" class="mono spend-val">$0.0000</span>
      </div>
      <button id="killBtn" class="btn btn-danger">PAUSE ALL</button>
      <span id="conn" class="conn-dot" title="SSE connection"></span>
    </nav>
  </header>

  <main class="cockpit">
    <div class="col-left">
      <section class="panel">
        <header class="panel-hdr">
          <h2 class="panel-title">Org</h2>
          <span class="panel-sub">who's doing what now</span>
        </header>
        <div id="agents" class="agents"></div>
      </section>
    </div>

    <div class="col-right">
      <section class="panel">
        <header class="panel-hdr">
          <h2 class="panel-title">Kanban</h2>
          <span class="panel-sub">tickets this cycle</span>
        </header>
        <div id="kanban" class="kanban"></div>
      </section>

      <section class="panel">
        <header class="panel-hdr">
          <h2 class="panel-title">Changes</h2>
          <span class="panel-sub">approvals &amp; merges</span>
        </header>
        <div id="changes" class="changes"></div>
      </section>
    </div>

    <section class="panel panel-feed">
      <header class="panel-hdr">
        <h2 class="panel-title">Activity</h2>
        <span class="panel-sub">event stream</span>
      </header>
      <div id="feed" class="feed-list"></div>
    </section>

    <section class="panel panel-console">
      <header class="panel-hdr">
        <h2 class="panel-title">Console</h2>
        <span class="panel-sub">agent output stream</span>
      </header>
      <div id="console" class="terminal" aria-live="polite" aria-label="Agent output console"></div>
    </section>

    <section class="panel panel-chat">
      <header class="panel-hdr">
        <h2 class="panel-title">Chat</h2>
        <span class="panel-sub">agent conversation</span>
      </header>
      <div id="chat" class="chat-list" aria-live="polite" aria-label="Agent chat messages"></div>
    </section>
  </main>

  <div id="pausedBanner" class="paused-banner hidden">⏸ PAUSED — the loop will halt before its next model call</div>
  <script src="/app.js"></script>
</body>
</html>
